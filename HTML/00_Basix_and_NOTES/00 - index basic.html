<!DOCTYPE html>
<html>
    <head>
        <title> THIS IS THE PAGE NAME </title>
        
    </head>
    <body>
        <p> THIS IS INSIDE PAGE </p>
    </body>
</html>

<!--
                        What the <head> can contain

Typical things in <head> include:

Element	Purpose
<title>	Sets the page title shown in the browser tab.
<meta>	Provides metadata like character set, viewport size, description for SEO.
<link>	Links external resources (stylesheets, icons, fonts).
<style>	Contains CSS styling directly in HTML.
<script>	Links JavaScript files or contains inline JavaScript that runs before/after page loads.
    
-->
