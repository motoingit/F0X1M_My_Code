<!DOCTYPE html>
<html lang="en">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <title>Event Playground</title>
        <link rel="stylesheet" href="style.css">
    </head>

    <body>
        <h1>DOM Events Playground</h1>
        <div class="controls">
            <button id="clickBtn">Click</button>
            <button id="dblClickBtn">Double Click</button>
            <button id="hoverBtn">Hover</button>
            <input id="inputBox" placeholder="Type something..." />
        </div>

        <p id="output">Event output will appear here</p>
        <script src="script.js"></script>
    </body>
</html>
