<!DOCTYPE html>
<html lang="en">
     <head>
     <meta charset="UTF-8" />
     <meta name="viewport" content="width=device-width, initial-scale=1.0" />
     <title>Currency Converter</title>
     <link rel="stylesheet" href="style.css" />
     <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css"/>
     </head>
     <body>

     <div class="container">
     <header>
          <h1>Currency Converter</h1>
     </header>

     <main>
          <form>
               <div class="amount">
                    <p>Enter Amount</p>
                    <input type="number" value="1" min="1" step="0.01">
               </div>

               <div class="dropdown">
                    <div class="from">
                         <p>From</p>
                         <div class="select-container">
                              <img src="https://flagsapi.com/US/flat/64.png" alt="flag">
                              <select name="from"></select>
                         </div>
                    </div>
               
                    <i class="fa-solid fa-arrow-right-arrow-left"></i>

                    <div class="to">
                         <p>To</p>
                         <div class="select-container">
                              <img src="https://flagsapi.com/IN/flat/64.png" alt="flag">
                              <select name="to"></select>
                         </div>
                    </div>
               </div>

               <div class="msg">1 USD = 80 INR</div>
               <button id="convertBtn">Get Exchange Rate</button>
          </form>
     </main>
     
     <footer>
          <p>Built with ❤️ by Mohit</p>
     </footer>
     </div>

     <script type="module" src="init.js"></script>
     </body>
</html>
